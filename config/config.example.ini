; ============================================================================
; WHP Research VM - Configuration Example
; ============================================================================
; Sections marked [wired] are actively read from this file.
; Sections marked [hardcoded] contain values set in source that CAN be moved
; here with minor code changes. We include them so you can see the full
; spoof surface and modify them if you extend the code.
; ============================================================================


; ============================================================================
; [timing] - TSC, APIC, and synthetic clock values [wired]
; ============================================================================
; These control how the emulated CPU reports timing.
[timing]
; Timestamp Counter frequency in Hz. Intel i9-10900K base = 3.7 GHz.
; TSC frequency should match the emulated CPU model.
tsc_frequency = 2800000000

; Offset added to every RDTSC/RDTSCP result to break timing correlation
; with the host. Larger values are safer but must not overflow.
tsc_offset = 4294967296

; Local APIC timer frequency in Hz. Standard x64 value.
apic_frequency = 100000000


; ============================================================================
; [hardware] - SMBIOS and system identification strings [wired]
; ============================================================================
; These are returned via NtQuerySystemInformation(SystemFirmwareTableInformation)
; and used to set the storage emulation model/serial strings.
[hardware]
; Motherboard model - also used as storage drive model string.
product = Z490 AORUS PRO AX

; Serial number - used as storage drive serial.
serial = SN0123456789

; SMBIOS fields — all wired from config
manufacturer = Gigabyte Technology Co., Ltd.
version = 1.0
guid = {00000000-0000-0000-0000-000000000000}
chassis_serial = CH0123456789
baseboard_serial = MB0123456789
bios_vendor = American Megatrends Inc.
bios_version = F20
bios_date = 04/15/2020


; ============================================================================
; [cpuid] - CPUID leaf spoofs [wired]
; ============================================================================
; Each leaf is specified as leaf_0x<hex>_<reg> like leaf_0x1_eax.
; Use leaf_0xB_0_eax for subleaf 0 of leaf 0xB.
; See config.ini for the actual active config file.
; Set vendor=amd to use AMD Ryzen 9 7950X profile (config overrides apply on top).

[cpuid]
; Leaf 0x0: Highest basic leaf + "GenuineIntel"
0_0_eax = 0x00000016
0_0_ebx = 0x756E6547
0_0_ecx = 0x6C65746E
0_0_edx = 0x49656E69

; Leaf 0x1: Family/Model/Stepping + feature flags
1_0_eax = 0x000A0655
1_0_ebx = 0x02100800
1_0_ecx = 0x7FFAFBFF
1_0_edx = 0xBFE9FBFF

; Leaf 0x2: Cache and TLB descriptors
2_0_eax = 0x76036301
2_0_ebx = 0x00F0B5FF
2_0_ecx = 0x00000000
2_0_edx = 0x00C30000

; Leaf 0x4: Deterministic cache parameters (subleaf 0)
4_0_eax = 0x1C004121
4_0_ebx = 0x01C0003F
4_0_ecx = 0x0000003F
4_0_edx = 0x00000000

; Leaf 0x7: Extended feature flags (subleaf 0)
7_0_eax = 0x00000000
7_0_ebx = 0x029C6FBF
7_0_ecx = 0x40000000
7_0_edx = 0xBC000400

; Leaf 0xB: Extended topology enumeration (subleaf 0 - thread level)
B_0_eax = 0x00000001
B_0_ebx = 0x00000002
B_0_ecx = 0x00000100
B_0_edx = 0x00000001

; Leaf 0xB: Extended topology (subleaf 1 - core level)
B_1_eax = 0x00000004
B_1_ebx = 0x00000008
B_1_ecx = 0x00000201
B_1_edx = 0x00000001

; Leaf 0x1F: V2 extended topology (subleaf 0 - thread level)
1F_0_eax = 0x00000001
1F_0_ebx = 0x00000002
1F_0_ecx = 0x00000100
1F_0_edx = 0x00000001

; Leaf 0x1F: V2 extended topology (subleaf 1 - core level)
1F_1_eax = 0x00000004
1F_1_ebx = 0x00000008
1F_1_ecx = 0x00000201
1F_1_edx = 0x00000001

; Leaf 0x1F: V2 extended topology (subleaf 2 - package level)
1F_2_eax = 0x00000008
1F_2_ebx = 0x00000010
1F_2_ecx = 0x00000302
1F_2_edx = 0x00000001

; Leaf 0x80000000: Highest extended leaf
80000000_0_eax = 0x80000008
80000000_0_ebx = 0x00000000
80000000_0_ecx = 0x00000000
80000000_0_edx = 0x00000000

; Leaf 0x80000001: Extended feature bits
80000001_0_eax = 0x00000000
80000001_0_ebx = 0x00000000
80000001_0_ecx = 0x00000121
80000001_0_edx = 0x2C100800

; Leaf 0x80000006: Extended cache info
80000006_0_eax = 0x00000000
80000006_0_ebx = 0x00000000
80000006_0_ecx = 0x02006040
80000006_0_edx = 0x00000000

; Leaf 0x80000008: Address size info
80000008_0_eax = 0x0000302C
80000008_0_ebx = 0x00000000
80000008_0_ecx = 0x00000000
80000008_0_edx = 0x00000000

; Brand string (encoded across leaves 0x80000002-0x80000004)
; These are generated from the brand string in CpuProfile.cpp.
; To customize, modify CpuProfile::LoadFromConfig() or wire config reading.
; brand_string = Intel(R) Core(TM) i9-10900K CPU @ 3.70GHz


; ============================================================================
; [gpu] - GPU identification [wired]
; ============================================================================
; GPU identity is configurable here. GPU-related syscalls and IOCTLs
; fall through to the real system (no interception). Only the identity
; string returned by non-GPU queries is spoofed.
[gpu]
vendor_id = 0x1002
device_id = 0x73BF
subsystem_id = 0x0E1D1002
revision_id = 0xC1
device_name = AMD Radeon RX 6800 XT


; ============================================================================
; [kuser] - KUSER_SHARED_DATA time offsets [wired]
; ============================================================================
; Time fields (0x318-0x370) are synced from the host every 1ms with
; configurable offsets applied. Static byte-level spoofs for version flags,
; feature bits, suite mask, and product type remain hardcoded in
; KuserSync::ApplyStaticSpoofs().
;
; Key offsets (relative to KUSER_SHARED_DATA base at 0x7FFE0000):
;   0x000-0x260: Tick count, interrupt time, system time (synced live)
;   0x260-0x26E: Version/flag bytes
;   0x270-0x280: Feature flags
;   0x2D0:       Suite mask
;   0x2E8:       Product type
;   0x320-0x360: Time fields (synced live)
;   0x370:       QPC value
;   0x378:       Reserved flag area
;   0x3C0:       Deep sleep / idle info


; ============================================================================
; [storage] - Virtual storage info [wired]
; ============================================================================
; All values read from config. Falls back to [hardware] product/serial if not set.
[storage]
model = Z490 AORUS PRO AX        ; same as [hardware] product
serial = SN0123456789            ; same as [hardware] serial
total_size = 549755813888        ; 512 GB in bytes
free_size = 274877906944         ; 256 GB in bytes


; ============================================================================
; [system] - NtQuerySystemInformation spoofs [wired]
; ============================================================================
; These control system-level information returned to the emulated process.
[system]
; Number of processors reported via SystemBasicInformation
processor_count = 20

; Processor affinity mask (bitmask of active logical processors)
processor_affinity_mask = 0xFF

; Physical memory in pages (0x400000 = 4 GB)
physical_page_count = 0x400000

; Timer resolution in 100ns units (default = 0x30D40 = 200000 = 20ms)
timer_resolution = 0x30D40


; ============================================================================
; [vm] - Virtual machine configuration [wired]
; ============================================================================
; These control the WHP partition setup.
[vm]
memory_size_mb = 512
cpu_count = 1


; ============================================================================
; [debug] - Logging and debugging [wired]
; ============================================================================
[debug]
; Log level. Higher = more output. 0=errors, 1=warnings, 2=info, 3=verbose, 4=debug
; log_level = 3

; Path to the log file. Default is whp.log next to engine.dll.
; log_path = whp.log

; Dump all CPUID exits (very verbose - can be GB-sized logs)
; log_all_cpuid = false

; Dump all syscall exits (very verbose)
; log_all_syscalls = false
