; ============================================================================
; Symbiote Capture Profile — Fingerprint Collection Mode
; ============================================================================
; This profile intercepts ALL queries the target makes and logs the REAL values
; to capture.log without spoofing anything. Use this to collect the exact
; hardware/software fingerprint your PC returns for every vector.
;
; After running the target with this profile, inspect capture.log to populate
; config.ini with the real values the target expects.
; ============================================================================

[capture]
enabled = true

[spoof]
; All spoofing disabled — pass through real values
cpuid = false
rdtsc = false
msr = false
kuser = false
process_info = false
registry = false
file = false
timing = false
gpu = false
token = false
thread = false
module_cloak = false

[cpuid]
vendor = intel

[timing]
tsc_frequency = 0   ; auto-detect
tsc_offset = 0
tsc_noise = 0

[kuser]
system_time_offset = 0
interrupt_time_offset = 0
utc_bias = 0

[vm]
memory_size_mb = 128
cpu_count = 1

[system_spoofer]
enabled = false

[eat]
enabled = false

[forwarding]
enabled = true

[proxy]
dll_list =

[target]
path =
arguments =
wait_for_debugger = false
