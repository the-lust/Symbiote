; =============================================================================
; Symbiote — CAPTURE profile
; =============================================================================
; Log-only mode — no interception of any kind.
; Every CPUID, MSR, RDTSC, syscall, and timing query is logged to a TSV file
; for offline fingerprint analysis. The target runs at native speed.
;
; Reference: launcher.exe --profile capture --target <target.exe>
; =============================================================================

[cpuid]
status = 0

[rdtsc]
status = 0

[msr]
status = 0

[kuser]
status = 0

[process]
status = 0

[registry]
status = 0

[file]
status = 0

[thread]
status = 0

[module_cloak]
status = 0

[token]
status = 0

[timing]
status = 0

[gpu]
status = 0

[hypervisor_hiding]
alloc_tracker = false
system_spoofer = false

[system_spoofer]
enabled = false

[watchdog]
enabled = false

[ept_split_view]
enabled = false

[acpi_timer]
enabled = false

[counter_updater]
enabled = false

[anti_scan]
enabled = false

[thread_hider]
enabled = false

[device_io]
enabled = false

[eat]
enabled = false

[forwarding]
enabled = true
host_syscall_thunk = true

[capture]
enabled = true
output = capture.tsv
log_all = true

[vm]
memory_size_mb = 512
cpu_count = 2

[target]
path = C:\Path\to\target.exe
arguments =
wait_for_debugger = false
