; =============================================================================
; Symbiote — ANALYSIS profile
; =============================================================================
; Reverse engineering with GDB stub and debug logging enabled.
; Spoofs hardware identity to a consistent profile, enables capture logging,
; and wires the GDB stub on TCP :1234 for remote debugging.
;
; Reference: launcher.exe --profile analysis --target <target.exe>
; =============================================================================

[cpuid]
status = 1

[rdtsc]
status = 1

[msr]
status = 1

[kuser]
status = 1

[process]
status = 1

[registry]
status = 1

[file]
status = 1

[thread]
status = 1

[module_cloak]
status = 1

[token]
status = 1

[timing]
status = 1

[hypervisor_hiding]
alloc_tracker = false
system_spoofer = false

[system_spoofer]
enabled = false

[watchdog]
enabled = false

[ept_split_view]
enabled = false

[acpi_timer]
enabled = true

[counter_updater]
enabled = true

[anti_scan]
enabled = false

[thread_hider]
enabled = false

[hwid_spoofing]
enabled = true

[memory_guard]
enabled = true

[device_io]
enabled = false

[eat]
enabled = true

[forwarding]
enabled = true
host_syscall_thunk = true

[gdb]
enabled = true
port = 1234
break_on_entry = true

[capture]
enabled = true
output = capture.tsv
log_all = true

[sandbox]
enabled = true
box_name = AnalysisBox
file_redirection = true
registry_redirection = true
ipc_filtering = true
virtual_disk = false

[vm]
memory_size_mb = 512
cpu_count = 2

[target]
path = C:\Path\to\target.exe
arguments =
wait_for_debugger = false
