; =============================================================================
; Symbiote — COMPAT profile
; =============================================================================
; Maximum compatibility, minimal interception.
; Use when the target crashes under WHP interception or is sensitive to timing.
; All spoofing OFF — WHP hides only the hypervisor bit and runs the target
; transparently with host ntdll forwarding.
;
; Reference: launcher.exe --profile compat --target <target.exe>
; =============================================================================

[cpuid]
status = 0

[rdtsc]
status = 0

[msr]
status = 1

[kuser]
status = 0

[process]
status = 0

[registry]
status = 0

[file]
status = 0

[thread]
status = 0

[module_cloak]
status = 0

[token]
status = 0

[timing]
status = 0

[hypervisor_hiding]
alloc_tracker = false
system_spoofer = false

[system_spoofer]
enabled = false

[watchdog]
enabled = false

[ept_split_view]
enabled = false

[acpi_timer]
enabled = false

[counter_updater]
enabled = false

[anti_scan]
enabled = false

[thread_hider]
enabled = false

[hwid_spoofing]
enabled = false

[memory_guard]
enabled = false

[device_io]
enabled = false

[eat]
enabled = false

[forwarding]
enabled = true
host_syscall_thunk = true

[sandbox]
enabled = false

[vm]
memory_size_mb = 512
cpu_count = 2

[target]
path = C:\Path\to\target.exe
arguments =
wait_for_debugger = false
