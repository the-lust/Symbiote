; =============================================================================
; Symbiote — STEALTH profile
; =============================================================================
; Maximum WHP hiding, zero detectable features.
; Use when the target actively scans for hypervisor presence.
;
; All CPUID/MSR/RDTSC interception ON, AllocTracker OFF, SystemSpoofer OFF.
; JitterDelay removed, INT3 trampolines removed — no timing patterns, no
; writable executable pages.
;
; Reference: launcher.exe --profile stealth --target <target.exe>
; =============================================================================

[cpuid]
status = 0

[rdtsc]
status = 0

[msr]
status = 1

[kuser]
status = 1

[process]
status = 1

[registry]
status = 1

[file]
status = 1

[thread]
status = 1

[module_cloak]
status = 1

[token]
status = 1

[timing]
status = 1

[hypervisor_hiding]
alloc_tracker = false
system_spoofer = false

[system_spoofer]
enabled = false

[watchdog]
enabled = false

[ept_split_view]
enabled = false

[acpi_timer]
enabled = true

[counter_updater]
enabled = true
tsc_frequency = 3700000000

[anti_scan]
enabled = false

[thread_hider]
enabled = true

[device_io]
enabled = true

[eat]
enabled = false

[forwarding]
enabled = true
host_syscall_thunk = true

[sandbox]
enabled = true
box_name = StealthBox
file_redirection = true
registry_redirection = true
ipc_filtering = true
virtual_disk = false

[vm]
memory_size_mb = 512
cpu_count = 2

[target]
path = C:\Path\to\target.exe
arguments =
wait_for_debugger = false
